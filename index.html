<style>
  body {
    margin: 0;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
    background: black;
    font-family: sans-serif;
    font-size: 14px;
  }
</style>

<div style="position: relative" id="parentDiv">
  <p
    id="scoreContainer"
    style="
      position: absolute;
      z-index: 10;
      color: aliceblue;
      left: 20px;
      top: 20px;
      margin: 0;
      display: none;
      font-family: sans-serif;
      font-size: 16px;
    "
  >
    <span>Score: </span><span id="score">0</span>
  </p>
  <canvas></canvas>

  <!-- Background Container -->
  <div
    id="startScreen"
    style="
      position: absolute;
      top: 0;
      right: 0;
      bottom: 0;
      left: 0;
      background: url(&quot;./img/startScreenBackground.png&quot;);
      z-index: 20;
      background-size: contain;
      background-repeat: no-repeat;
      display: flex;
      align-items: center;
      justify-content: center;
    "
  >
    <div style="text-align: center; position: relative; margin-top: -100px">
      <h1 style="color: aliceblue; margin-bottom: 30px">Space Invaders</h1>

      <!-- Buttom -->
      <div
        style="cursor: pointer; position: relative; display: inline-block"
        id="startButton"
      >
        <img
          src="./img/button.png"
          alt="Start Button"
          style="
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            cursor: pointer;
          "
          id="startButton"
        />
        <span
          style="
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 28px;
          "
          >Start</span
        >
      </div>
    </div>
  </div>

  <!-- Restart Screen -->
  <!-- Background Container -->
  <div
    id="restartScreen"
    style="
      position: absolute;
      top: 0;
      right: 0;
      bottom: 0;
      left: 0;
      background: url(&quot;./img/startScreenBackground.png&quot;);
      z-index: 20;
      background-size: contain;
      background-repeat: no-repeat;
      display: none;
      align-items: center;
      justify-content: center;
    "
  >
    <div style="text-align: center; position: relative; margin-top: -100px">
      <h1 style="color: aliceblue; font-size: 24px">Game Over</h1>
      <h1 id="finalScore" style="color: aliceblue; margin: 0; font-size: 48px">
        300
      </h1>
      <p style="color: aliceblue; margin-top: 0; margin-bottom: 20px">Points</p>

      <!-- buttom -->
      <div
        style="cursor: pointer; position: relative; display: inline-block"
        id="restartButton"
      >
        <img
          src="./img/button.png"
          alt="Restart Button"
          style="
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            cursor: pointer;
          "
          id="restartButton"
        />
        <span
          style="
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 24px;
          "
          >Restart</span
        >
      </div>
    </div>
  </div>
</div>

  src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.13.0/gsap.min.js"

  crossorigin="anonymous"
  referrerpolicy="no-referrer"
></script>
<script

  integrity="sha512-xi/RZRIF/S0hJ+yJJYuZ5yk6/8pCiRlEXZzoguSMl+vk2i3m6UjUO/WcZ11blRL/O+rnj94JRGwt/CHbc9+6EA=="
  crossorigin="anonymous"
  referrerpolicy="no-referrer"
></script>

<script src="js/util.js"></script>
